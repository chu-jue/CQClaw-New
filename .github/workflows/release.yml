name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Install Tauri client deps
        working-directory: desktop/tauri-client
        run: npm ci

      - name: Build Windows installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File packaging/windows/build-inno.ps1

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: cqclaw-windows-installer
          path: dist/*.exe

  build-macos-dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri client deps
        working-directory: desktop/tauri-client
        run: npm ci

      - name: Build Tauri macOS app
        working-directory: desktop/tauri-client
        run: npm run build

      - name: Stage .app and .dmg
        run: |
          mkdir -p dist
          cp -R desktop/tauri-client/src-tauri/target/release/bundle/macos/*.app dist/ 2>/dev/null || true
          cp -R desktop/tauri-client/src-tauri/target/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true
          ls -la dist/

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: cqclaw-macos-dmg
          path: |
            dist/*.dmg
            dist/*.app

  publish-release:
    needs: [build-windows-installer, build-macos-dmg]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate manifests
        run: python3 tools/generate_release_manifest.py --dist dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CQClaw ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/**/*.exe
            dist/**/*.zip
            dist/**/*.dmg
            dist/**/*.json
